      <!-- EDITAR -->
    
    <!-- MODAL DELETE -->
    <!-- MODAL EDITAR -->
    <dialog id="editDialog">
      <div class="modal-cardU">
        <h1>Editar Aluno</h1>

        <form id="editForm">
          <input type="hidden" id="editId">

          <label>Nome</label>
          <input type="text" id="editNome">

          <label>Email</label>
          <input type="email" id="editEmail">

          <label>CPF</label>
          <input type="text" id="editCpf">

          <label>Turma</label>
          <input type="number" id="editTurma">

          <div class="modal-actions">
            <button type="button" id="closeEdit">Cancelar</button>
            <button type="submit" id="saveEdit">Salvar</button>
          </div>
        </form>
      </div>
    </dialog>


    <!-- MODAL DELETE -->
    <dialog id="deleteDialog">
      <div class="modal-cardD">
        <h3>Deseja deletar este aluno?</h3>
        <p id="deleteText"></p>

        <div class="modal-actions">
          <button id="closeDelete">Cancelar</button>
          <button id="confirmDelete">Confirmar</button>
        </div>
      </div>
    </dialog>

    <!-- MODAL ADD  -->
    <dialog id="addDialog">
      <div class="modal-cardAdd">
        <h3>Adicionar Aluno</h3>

        <form id="addForm">

          <label>Nome</label>
          <input type="text" id="addNome" required>

          <label>Email</label>
          <input type="email" id="addEmail" required>

          <label>CPF</label>
          <input type="text" id="addCpf" required>

          <label>Status</label>
          <select id="addStatus">
            <option value="Ativo">Ativo</option>
            <option value="Inativo">Inativo</option>
          </select>

          <label>Turma</label>
          <input type="number" id="addTurma" required>

          <div class="modal-actions">
            <button type="button" id="closeAdd">Cancelar</button>
            <button type="submit">Adicionar</button>
          </div>

        </form>
      </div>
    </dialog>

  </main>
  
  <script>
    document.addEventListener("DOMContentLoaded", () => {

      const editDialog = document.getElementById("editDialog");
      const deleteDialog = document.getElementById("deleteDialog");

      const closeEdit = document.getElementById("closeEdit");
      const closeDelete = document.getElementById("closeDelete");

      const deleteText = document.getElementById("deleteText");

      let currentRow = null;

      // BOTÃO EDITAR
      document.querySelectorAll(".btn-edit").forEach(button => {
        button.addEventListener("click", (e) => {

          const row = e.target.closest("tr");
          currentRow = row;

          document.getElementById("editId").value = row.cells[0].innerText;
          document.getElementById("editNome").value = row.cells[1].innerText;
          document.getElementById("editEmail").value = row.cells[2].innerText;
          document.getElementById("editCpf").value = row.cells[3].innerText;
          document.getElementById("editTurma").value = row.cells[5].innerText;

          editDialog.showModal();
        });
      });

      // BOTÃO DELETE
      document.querySelectorAll(".btn-delete").forEach(button => {
        button.addEventListener("click", (e) => {

          const row = e.target.closest("tr");
          currentRow = row;

          const nome = row.cells[1].innerText;

          deleteText.innerText = "Aluno: " + nome;

          deleteDialog.showModal();
        });
      });

      // FECHAR
      closeEdit.addEventListener("click", () => editDialog.close());
      closeDelete.addEventListener("click", () => deleteDialog.close());

      // CONFIRMAR DELETE
      document.getElementById("confirmDelete").addEventListener("click", () => {
        if (currentRow) {
          currentRow.remove();
        }
        deleteDialog.close();
      });

    });
  </script>
  <!-- SCRIPT ADD -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {

      const addDialog = document.getElementById("addDialog");
      const openAdd = document.querySelector(".btn-add");
      const closeAdd = document.getElementById("closeAdd");
      const addForm = document.getElementById("addForm");

      const table = document.querySelector("tbody");

      // Abrir modal
      openAdd.addEventListener("click", () => {
        addDialog.showModal();
      });

      // Fechar modal
      closeAdd.addEventListener("click", () => {
        addDialog.close();
      });

      // Enviar formulário
      addForm.addEventListener("submit", (e) => {
        e.preventDefault();

        // Pegando valores
        const nome = document.getElementById("addNome").value;
        const email = document.getElementById("addEmail").value;
        const cpf = document.getElementById("addCpf").value;
        const status = document.getElementById("addStatus").value;
        const turma = document.getElementById("addTurma").value;

        // Criar nova linha
        const newRow = table.insertRow();

        const id = table.rows.length; // gera ID simples automático

        newRow.innerHTML = `
          <td>${id}</td>
          <td>${nome}</td>
          <td>${email}</td>
          <td>${cpf}</td>
          <td>${status}</td>
          <td>${turma}</td>
          <td>
            <button class="btn-edit">Modificar</button>
            <button class="btn-delete">Deletar</button>
          </td>
        `;

        // Limpar formulário
        addForm.reset();

        addDialog.close();
      });

    });
  </script>
